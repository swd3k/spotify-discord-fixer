name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  # Windows: полная сборка решения (UI net8.0-windows) + тесты
  check-windows:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: SpotifyDiscordFixer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SpotifyDiscordFixer.sln

      - name: Build
        run: dotnet build SpotifyDiscordFixer.sln -c Release --no-restore

      - name: Test
        run: dotnet test SpotifyDiscordFixer.sln -c Release --no-build --nologo

  # Linux: Core + Infrastructure (кроссплатформенный код, без UI)
  check-linux:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SpotifyDiscordFixer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore (Core + Infrastructure + tests)
        run: |
          dotnet restore src/SpotifyDiscordFixer.Core/SpotifyDiscordFixer.Core.csproj
          dotnet restore src/SpotifyDiscordFixer.Infrastructure/SpotifyDiscordFixer.Infrastructure.csproj
          dotnet restore tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj
          dotnet restore tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj

      - name: Build
        run: |
          dotnet build src/SpotifyDiscordFixer.Core/SpotifyDiscordFixer.Core.csproj -c Release --no-restore
          dotnet build src/SpotifyDiscordFixer.Infrastructure/SpotifyDiscordFixer.Infrastructure.csproj -c Release --no-restore
          dotnet build tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj -c Release --no-restore
          dotnet build tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj -c Release --no-restore

      - name: Test Core
        run: dotnet test tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj -c Release --no-build --nologo

      - name: Test Infrastructure
        run: dotnet test tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj -c Release --no-build --nologo

  # macOS: Core + Infrastructure (как на Linux)
  check-macos:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: macos-14
    defaults:
      run:
        working-directory: SpotifyDiscordFixer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore (Core + Infrastructure + tests)
        run: |
          dotnet restore src/SpotifyDiscordFixer.Core/SpotifyDiscordFixer.Core.csproj
          dotnet restore src/SpotifyDiscordFixer.Infrastructure/SpotifyDiscordFixer.Infrastructure.csproj
          dotnet restore tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj
          dotnet restore tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj

      - name: Build
        run: |
          dotnet build src/SpotifyDiscordFixer.Core/SpotifyDiscordFixer.Core.csproj -c Release --no-restore
          dotnet build src/SpotifyDiscordFixer.Infrastructure/SpotifyDiscordFixer.Infrastructure.csproj -c Release --no-restore
          dotnet build tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj -c Release --no-restore
          dotnet build tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj -c Release --no-restore

      - name: Test Core
        run: dotnet test tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj -c Release --no-build --nologo

      - name: Test Infrastructure
        run: dotnet test tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj -c Release --no-build --nologo

  # Релиз по тегу v*: publish multi-arch + Setup (Inno Setup) — только Windows
  release-win:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: SpotifyDiscordFixer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          # Chocolatey is reliable on windows-latest (jrsoftware.org download.php often fails in CI).
          choco install innosetup -y --no-progress
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found after installing Inno Setup 6" }
          Write-Host "ISCC=$iscc"
          "ISCC=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test SpotifyDiscordFixer.sln -c Release --nologo

      - name: Publish + installers
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          if ([string]::IsNullOrWhiteSpace($ver)) { $ver = "0.0.0-ci" }
          Write-Host "Building installers for version=$ver"
          .\scripts\build-installer.ps1 -Version $ver -PublishFirst -IsccPath $env:ISCC

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: |
            SpotifyDiscordFixer/dist/installers/*.exe
            SpotifyDiscordFixer/dist/*.zip
          if-no-files-found: error

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [release-win]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: release

      - name: List
        run: ls -la release/

      - name: SHA256
        run: |
          cd release
          # Exclude directory 'installers' from hashing
          find . -type f -not -path '*/installers/*' -print0 | xargs -0 sha256sum 2>/dev/null | sed 's|  \./|  |' > SHA256SUMS.txt || true
          cat SHA256SUMS.txt
          ls -la

      - name: Build release notes from CHANGELOG.md
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v", "V")
          $text = Get-Content "CHANGELOG.md" -Raw -Encoding UTF8
          $pattern = "(?s)## \[$([regex]::Escape($ver))\][^\n]*\n(.*?)(?=\n## \[|\z)"
          $m = [regex]::Match($text, $pattern)
          if (-not $m.Success) { throw "No CHANGELOG section for version $ver" }
          $body = $m.Groups[1].Value.Trim()
          $body = [regex]::Replace($body, "\r?\n---\s*$", "").Trim()
          $header = "# Spotify Discord Fixer $tag`n`n"
          $footer = "`n`n---`n`n**Требования:** Windows 10/11 · [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) · [WebView2](https://developer.microsoft.com/microsoft-edge/webview2/) · **права администратора** для hosts`n`nПолная история: [CHANGELOG.md](https://github.com/swd3k/spotify-discord-fixer/blob/main/CHANGELOG.md) · [README](https://github.com/swd3k/spotify-discord-fixer#readme)`n"
          $notes = $header + $body + $footer
          [System.IO.File]::WriteAllText("release_body.md", $notes, [System.Text.UTF8Encoding]::new($false))
          Write-Host "Wrote release_body.md for $tag"

      # Only attach files if release does not already exist with assets (manual upload / re-tag).
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.zip
          body_path: release_body.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          make_latest: true
