name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

# Node 20 на runners deprecated → 22 LTS (совместим с electron-builder).
env:
  NODE_VERSION: "22"

jobs:
  # Проверка на каждый push в main и PR: ловит битые файлы и ошибки сборки
  # сразу, а не на этапе релиза.
  check:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Ловит «тихие» поломки сборки: например, без vite.config.ts vite собирает
      # в dist/ вместо dist/renderer/, и приложение открывается пустым окном.
      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path dist/renderer/index.html)) { throw "dist/renderer/index.html отсутствует — проверьте vite.config.ts" }
          if (-not (Test-Path dist/electron/main.js)) { throw "dist/electron/main.js отсутствует" }
          if (-not (Test-Path dist/electron/preload.js)) { throw "dist/electron/preload.js отсутствует" }

  release-win:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Windows (x64 + arm64)
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
            release/*.yml

  release-linux:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build Linux (x64 + arm64)
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            release/*.AppImage
            release/*.deb

  release-mac:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    # macos-14 = Apple Silicon runner; electron-builder сам кросс-собирает x64 + arm64.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build macOS (x64 + arm64)
        run: npm run dist:mac
        env:
          # Без Apple Developer ID: unsigned build для распространения через Releases.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            release/*.dmg
            release/*.zip

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [release-win, release-linux, release-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.exe' -o -name '*.blockmap' -o -name '*.AppImage' -o \
            -name '*.deb' -o -name '*.dmg' -o -name '*.zip' -o -name '*.yml' \
          \) -exec cp -v {} release/ \;
          ls -la release/

      - name: Extract release notes
        shell: bash
        run: awk '/^---/{exit} {print}' RELEASE_NOTES.md > release_body.md

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' ! -name '*.yml' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's|  \./|  |' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          body_path: release_body.md
          draft: false
          prerelease: false
