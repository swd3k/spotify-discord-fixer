name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  # Windows: полная сборка решения (UI net8.0-windows) + тесты
  check-windows:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: SpotifyDiscordFixer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SpotifyDiscordFixer.sln

      - name: Build
        run: dotnet build SpotifyDiscordFixer.sln -c Release --no-restore

      - name: Test
        run: dotnet test SpotifyDiscordFixer.sln -c Release --no-build --nologo

  # Linux: Core + Infrastructure (кроссплатформенный код, без UI)
  check-linux:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SpotifyDiscordFixer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore (Core + Infrastructure + tests)
        run: |
          dotnet restore src/SpotifyDiscordFixer.Core/SpotifyDiscordFixer.Core.csproj
          dotnet restore src/SpotifyDiscordFixer.Infrastructure/SpotifyDiscordFixer.Infrastructure.csproj
          dotnet restore tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj
          dotnet restore tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj

      - name: Build
        run: |
          dotnet build src/SpotifyDiscordFixer.Core/SpotifyDiscordFixer.Core.csproj -c Release --no-restore
          dotnet build src/SpotifyDiscordFixer.Infrastructure/SpotifyDiscordFixer.Infrastructure.csproj -c Release --no-restore
          dotnet build tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj -c Release --no-restore
          dotnet build tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj -c Release --no-restore

      - name: Test Core
        run: dotnet test tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj -c Release --no-build --nologo

      - name: Test Infrastructure
        run: dotnet test tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj -c Release --no-build --nologo

  # macOS: Core + Infrastructure (как на Linux)
  check-macos:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: macos-14
    defaults:
      run:
        working-directory: SpotifyDiscordFixer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore (Core + Infrastructure + tests)
        run: |
          dotnet restore src/SpotifyDiscordFixer.Core/SpotifyDiscordFixer.Core.csproj
          dotnet restore src/SpotifyDiscordFixer.Infrastructure/SpotifyDiscordFixer.Infrastructure.csproj
          dotnet restore tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj
          dotnet restore tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj

      - name: Build
        run: |
          dotnet build src/SpotifyDiscordFixer.Core/SpotifyDiscordFixer.Core.csproj -c Release --no-restore
          dotnet build src/SpotifyDiscordFixer.Infrastructure/SpotifyDiscordFixer.Infrastructure.csproj -c Release --no-restore
          dotnet build tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj -c Release --no-restore
          dotnet build tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj -c Release --no-restore

      - name: Test Core
        run: dotnet test tests/SpotifyDiscordFixer.Core.Tests/SpotifyDiscordFixer.Core.Tests.csproj -c Release --no-build --nologo

      - name: Test Infrastructure
        run: dotnet test tests/SpotifyDiscordFixer.Infrastructure.Tests/SpotifyDiscordFixer.Infrastructure.Tests.csproj -c Release --no-build --nologo

  # Релиз по тегу v*: publish multi-arch + Setup (Inno Setup) — только Windows
  release-win:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: SpotifyDiscordFixer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          $installer = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait

      - name: Version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test SpotifyDiscordFixer.sln -c Release --nologo

      - name: Publish + installers
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 -Version "${{ steps.ver.outputs.version }}" -PublishFirst

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: |
            SpotifyDiscordFixer/dist/installers/*.exe
            SpotifyDiscordFixer/dist/*.zip

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [release-win]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: release

      - name: List
        run: ls -la release/

      - name: SHA256
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt || shasum -a 256 * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
